<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thành Viễn ERP - POS & Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        /* Hiệu ứng cho các tab */
        .tab-content { transition: all 0.3s ease; }
        .hidden { display: none; }
        
        /* Card đã xong */
        .task-done { background-color: #ecfdf5 !important; border: 1px solid #6ee7b7 !important; opacity: 0.8; }
        .task-done h4 { text-decoration: line-through; color: #059669; }

        /* Tùy chỉnh thanh cuộn ngang */
        .scroll-container::-webkit-scrollbar { height: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Menu cố định bên dưới */
        nav { box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <header class="bg-blue-900 text-white p-3 shadow-md sticky top-0 z-50">
        <div class="max-w-full px-2 flex justify-between items-center">
            <h1 class="font-bold uppercase text-[10px] tracking-tighter flex items-center gap-2">
                <i class="fas fa-snowflake animate-spin-slow"></i> ĐIỀU HÀNH THÀNH VIỄN
            </h1>
            <div id="clock" class="text-[9px] font-mono bg-blue-800 px-2 py-1 rounded-full border border-blue-700"></div>
        </div>
    </header>

    <main class="max-w-full px-4 pt-4 pb-24">
        
        <section id="tab-pos" class="tab-content block">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-slate-800 font-extrabold uppercase text-xs">Tạo Đơn Dịch Vụ Mới</h2>
                <span class="text-[10px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full font-bold">POS v3.1</span>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Khách hàng</label>
                    <input type="text" id="inpTen" placeholder="Họ tên khách hàng..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="tel" id="inpSdt" placeholder="Số điện thoại" class="p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                        <select id="inpKhuVuc" class="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold">
                            <option value="Gò Vấp">Gò Vấp</option>
                            <option value="Quận 12">Quận 12</option>
                            <option value="Tân Bình">Tân Bình</option>
                            <option value="Hóc Môn">Hóc Môn</option>
                        </select>
                    </div>
                    <input type="text" id="inpDiaChi" placeholder="Địa chỉ chi tiết..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                </div>

                <hr class="border-slate-100">

                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-orange-600 uppercase tracking-widest">Dịch vụ & Thợ</label>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="inpDichVu" class="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold">
                            <option value="Vệ sinh máy lạnh">Vệ sinh</option>
                            <option value="Sửa máy lạnh">Sửa chữa</option>
                            <option value="Lắp đặt máy">Lắp đặt</option>
                            <option value="Lắp Camera">Lắp Camera</option>
                        </select>
                        <select id="inpTho" class="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold">
                            <option value="Thành Viễn">Thành Viễn</option>
                            <option value="Thợ 1">Thợ 1</option>
                            <option value="Thợ 2">Thợ 2</option>
                        </select>
                    </div>
                    <input type="date" id="inpNgay" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                    <textarea id="inpGhiChu" placeholder="Ghi chú thêm (vd: Máy lạnh LG 1HP)..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm h-20"></textarea>
                </div>

                <button id="btnSave" class="w-full bg-blue-700 hover:bg-blue-800 text-white p-4 rounded-2xl font-bold uppercase shadow-lg shadow-blue-200 active:scale-95 transition-all text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-paper-plane"></i> XÁC NHẬN TẠO ĐƠN
                </button>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-slate-800 font-extrabold uppercase text-xs">Lịch Trình Điều Hành</h2>
                <button onclick="loadData()" class="text-blue-600 text-xs font-bold"><i class="fas fa-sync-alt mr-1"></i> Làm mới</button>
            </div>
            
            <div id="main-grid-container" class="scroll-container flex flex-nowrap overflow-x-auto gap-4 items-start min-h-[500px]">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around p-3 z-[100]">
        <button id="btn-nav-pos" onclick="switchTab('pos')" class="flex flex-col items-center text-blue-600 transition-all">
            <i class="fas fa-receipt text-xl"></i>
            <span class="text-[9px] font-bold uppercase mt-1 tracking-tighter">Bán Hàng</span>
        </button>
        <button id="btn-nav-schedule" onclick="switchTab('schedule')" class="flex flex-col items-center text-slate-400 transition-all">
            <i class="fas fa-calendar-check text-xl"></i>
            <span class="text-[9px] font-bold uppercase mt-1 tracking-tighter">Lịch Làm Việc</span>
        </button>
    </nav>

    <script type="module" src="./modules/task.js"></script>

</body>
</html>
